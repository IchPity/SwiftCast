<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0533"/>
      <stop offset="100%" stop-color="#0D1B4B"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0ABFC"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow border -->
  <rect width="100" height="100" rx="22" ry="22"
        fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>

  <!-- Lightning bolt - main icon -->
  <path d="M 57 12 L 31 53 L 48 53 L 43 88 L 69 47 L 52 47 Z"
        fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- Highlight reflection on bolt -->
  <path d="M 57 12 L 42 38 L 50 38 L 57 12 Z"
        fill="url(#accentGrad)" opacity="0.6"/>
</svg>
